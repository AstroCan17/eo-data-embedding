name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # CPU torch + torchvision from the same index (matched ABI — avoids the
      # "operator torchvision::nms does not exist" mismatch; default torchvision is a CUDA build).
      - run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      # `dependencies` is dynamic from requirements.txt, so this installs the full stack.
      - run: pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff check .
          ruff format --check .
      - name: Unit tests
        run: pytest

  docker-cpu:
    needs: lint-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Build smoke for the deployable CPU image (the GPU image + data/GPU phases
      # are intentionally not run in CI — no GPU or datasets on hosted runners).
      - name: Build CPU image
        run: docker build -f Dockerfile.cpu -t eo-data-embedding:cpu .
