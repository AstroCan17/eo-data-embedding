name: docs

# Build the MkDocs Material site and deploy it to GitHub Pages. Pages source must be set to
# "GitHub Actions" once in repo Settings → Pages (after the repo is public). research/*.md and
# CHANGELOG.md are copied into docs/ at build time so the source of truth stays in the repo root.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-docs.txt
      - name: Assemble docs sources
        run: |
          cp -r research docs/research
          cp CHANGELOG.md docs/changelog.md
      - run: mkdocs build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
