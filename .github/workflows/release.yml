name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install flit
      - name: Build wheel + sdist
        run: flit build
      - name: Create GitHub Release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            eo-data-embedding ${{ github.ref_name }}.

            Multi-modal geospatial embedding search & change detection on a frozen Clay v1.5 ViT.
            Wheel and sdist are attached below. Full release note: `docs/srn.md`.

  image:
    # GHCR image is best-effort; the build needs the CPM index secret and is heavy.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            CPM_INDEX_URL=${{ secrets.CPM_INDEX_URL }}
          tags: |
            ghcr.io/astrocan17/eo-data-embedding:${{ github.ref_name }}
            ghcr.io/astrocan17/eo-data-embedding:latest
