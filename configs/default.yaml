# Default configuration for geo-embed-eo.
# Phase scripts read their argparse *defaults* from here (CLI flags still override).
# Loaded via geo_embed_eo.config.load_config().

model:
  name: clay # clay | prithvi | timm-vit (sanity/baseline)
  timm_backbone: vit_small_patch16_224 # phase0 sanity + CNN-vs baseline
  device: cuda # cuda | cpu
  precision: fp32 # P40 is Pascal — keep fp32 (fp16 is slow)

data:
  dataset: eurosat # eurosat (fast optical) | bigearthnet (multi-modal, ~120GB)
  root: data/
  subset_size: 2000 # keep small — embed a few thousand patches, not the whole set

embed:
  batch_size: 32
  store_path: artifacts/embeddings.parquet

search:
  top_k: 10
  out: artifacts/search_results.md

probe:
  shots: [5, 20, 50]
  out: artifacts/probe_results.md

change:
  threshold: auto # auto | float
  frac: 0.05 # changed-pixel fraction for a tile to count as changed
